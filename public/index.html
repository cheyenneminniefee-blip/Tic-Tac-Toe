<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tic Tac Toe AI!</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <h1>Tic Tac Toe AI!</h1>

        <div id="auth-container">
            <h2>Login or Register</h2>
            <input type="text" id="username" placeholder="Username" />
            <input type="password" id="password" placeholder="Password" />

            <div class="button-group">
                <button id="login-btn">Login</button>
                <button id="register-btn">Register</button>
            </div>

            <p id="auth-message"></p>
        </div>

        <div id="game-container" style="display: none">
            <h2>Welcome, <span id="display-username"></span>!</h2>
            <button id="logout-btn">Logout</button>
            <a
                href="stats.html"
                style="
                    color: #fca311;
                    text-decoration: underline;
                    margin-left: 15px;
                "
                >View Global Leaderboard & AI Stats</a
            >

            <div id="game-ui" style="margin-top: 20px">
                <h3 id="turn-indicator" style="color= #ffffff">Player X's Turn</h3>

                <div id="tic-tac-toe-board"></div>
                <div>
                    <button id="reset-btn" style="margin-top: 15px">
                        Reset Board
                    </button>
                </div>
                <button id="scramble-btn">Scramble Board (1 Use)</button>
                <div style="margin-top: 15px">
                    <label><strong>Mode:</strong></label>
                    <select id="game-mode">
                        <option value="pvp">Human vs Human</option>
                        <option value="ai" selected>Human vs AI</option>
                    </select>

                    <label style="margin-left: 10px"
                        ><strong>Difficulty:</strong></label
                    >
                    <select id="ai-difficulty">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                        <option value="ultra">Insane</option>
                    </select>
                </div>
                <label for="ai-personality">AI Personality:</label>
                <select id="ai-personality">
                    <option value="friendly">Friendly</option>
                    <option value="funny">Funny</option>
                    <option value="trash-talker">Trash Talker</option>
                </select>

                <div
                    id="ai-message-box"
                    style="margin-top: 10px; font-style: italic; color: #ffffff"
                >
                    AI says: "Let's play!"
                </div>
            </div>
        <div id="history-section" style="margin-top: 30px; border-top: 2px solid #334155; padding-top: 20px;">
            <h3 style="color: #fca311; margin-bottom: 15px;">Your Game History</h3>
            <table class="stats-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Result</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="history-list-body">
                    </tbody>
            </table>
        </div>

        <div id="replay-modal" class="modal">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h2 style="color: #fca311; margin-bottom: 15px;">Final Board State</h2>
                <div id="replay-board-container"></div>
            </div>
        </div>

        <script src="main.js"></script>
    </body>
</html>
